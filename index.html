<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuki Qarat by Amora | Premium Crunchy Delights</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- BRAND DESIGN SYSTEM --- */
        :root {
            --primary: #6F4E37;       /* Deep Rich Cookie Chocolate Brown */
            --primary-hover: #523624;
            --accent: #D4AF37;        /* Gold Accent Line Elegance */
            --light-bg: #FDFBF7;      /* Warm Milky Cream Background */
            --card-bg: #FFFFFF;
            --text-dark: #2B2521;     /* Dark Charcoal Espresso */
            --text-muted: #7A726C;
            --shadow: 0 15px 35px rgba(111, 78, 55, 0.07);
            --transition: all 0.3s ease;
        }

        /* --- RESET UTILITIES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--light-bg);
            color: var(--text-dark);
            line-height: 1.6;
            scroll-behavior: smooth;
        }
        img {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 16px;
        }
        a {
            text-decoration: none;
            color: inherit;
        }

        /* --- NAVIGATION BAR --- */
        header {
            background-color: rgba(253, 251, 247, 0.95);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid rgba(111, 78, 55, 0.08);
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo span {
            font-size: 0.9rem;
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            display: block;
        }
        .nav-links {
            display: flex;
            list-style: none;
            gap: 35px;
        }
        .nav-links a {
            font-weight: 500;
            font-size: 0.95rem;
            color: var(--text-dark);
            transition: var(--transition);
        }
        .nav-links a:hover {
            color: var(--primary);
        }

        /* --- HERO SECTION --- */
        .hero {
            padding: 180px 20px 100px;
            background: radial-gradient(circle at top right, #FFF9F2 0%, var(--light-bg) 100%);
            min-height: 85vh;
            display: flex;
            align-items: center;
        }
        .hero-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 60px;
            align-items: center;
        }
        .tagline {
            display: inline-block;
            background-color: rgba(111, 78, 55, 0.08);
            color: var(--primary);
            padding: 6px 18px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
        }
        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.8rem;
            line-height: 1.15;
            color: var(--text-dark);
            margin-bottom: 25px;
        }
        .hero h1 span {
            color: var(--primary);
        }
        .hero p {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            max-width: 520px;
        }
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background-color: var(--primary);
            color: #FFFFFF;
            padding: 16px 38px;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 10px
